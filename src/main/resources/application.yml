server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          timeout: 180000
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000

# DashScope embedding

dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}
  embedding:
    model: text-embedding-v4

document:
  chunk:
    max-size: 800
    overlap: 100

rag:
  top-k: 3
  model: "qwen3-max"
  rewrite:
    enabled: true
    llm-enabled: false
    timeout-ms: 1500
    max-sub-questions: 3
  search:
    channels:
      original-enabled: true
      rewritten-enabled: true
      subquestion-enabled: true
      top-k-per-channel: 5
    postprocess:
      dedup-enabled: true
      rerank-enabled: true
      vector-weight: 0.65
      keyword-weight: 0.25
      title-metadata-weight: 0.10
  rate-limit:
    local:
      enabled: true
      max-concurrent: 20
      max-wait-seconds: 15
      max-queue-size: 200
  trace:
    logging:
      enabled: true

prometheus:
  base-url: http://localhost:9090
  timeout: 10
  mock-enabled: true

cls:
  mock-enabled: true # 开启mock

ai:
  routing:
    chat:
      models:
        - qwen-plus
    aiops:
      models:
        - qwen-plus
    circuit-breaker:
      failure-threshold: 2
      open-window-ms: 30000

chat:
  memory:
    enabled: true
    llm-enabled: false
    llm-timeout-ms: 1200
    recent-pairs: 6
    compress-batch-pairs: 2
    max-summary-chars: 1600

ingest:
  pipeline:
    enabled: true
    worker-threads: 2
    queue-capacity: 200
    task-retention-minutes: 120
    retry:
      max-attempts: 3
      initial-backoff-ms: 200
