server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          timeout: 180000
      retry:
        max-attempts: 3
        backoff:
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000

# DashScope embedding

dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:}
  embedding:
    model: text-embedding-v4

document:
  chunk:
    max-size: 800
    overlap: 100

rag:
  top-k: 3
  model: "qwen3-max"
  rate-limit:
    local:
      enabled: true
      max-concurrent: 20
      max-wait-seconds: 15
      max-queue-size: 200
  trace:
    logging:
      enabled: true

prometheus:
  base-url: http://localhost:9090
  timeout: 10
  mock-enabled: true

cls:
  mock-enabled: false

ai:
  routing:
    chat:
      models:
        - qwen3-max
    aiops:
      models:
        - qwen3-max
    circuit-breaker:
      failure-threshold: 2
      open-window-ms: 30000
